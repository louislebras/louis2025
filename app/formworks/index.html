<link rel="stylesheet" href="[ROOT]/css/pages/case.css">


<div class="container-case">
    <div class="content-case-container">
        <div class="heading-desk no-mobile">
            <h1 class="s-size">{{title-h1}}</h1>
        </div>


        <div class="content-section">
            <span class="subtitle">{{the-company}}</span>
            <div class="other-content-text">
                <h2 class="grey no-mobile">{{title-h2}}
                </h2>
                <p class="">
                    {{p1}}
                </p>
            </div>
        </div>

        <div class="content-section">
            <span class="subtitle">{{critical-moments}}</span>
            <div class="other-content-text">
                <h3 class="grey">{{title-h3}}
                </h3>
                <p class="">
                    {{p2}}
                </p>
            </div>
        </div>

        <div class="content-section">
            <span class="subtitle">{{practice}}</span>
            <div class="other-content-text">
                <h3 class="grey">{{title-h4}}
                </h3>
                <p class="">
                    {{p3}}
                </p>
            </div>
        </div>
    </div>
    <div class="visual-case-container">
        <div class="main-visual-content">
            <img src="../../assets/media/formworksoffice/office.png" alt="Office">
        </div>
        <div class="flex-grid">
            <div class="w-40">
                <img src="../../assets/media/formworksoffice/name-logo.png" alt="Name Logo">
            </div>
        </div>
    </div>
    <div class="mobile-header only-mobile">
        <h1 class="s-size">{{title-h1}}</h1>
    </div>
</div>

<script src="[ROOT]/js/case-selector-menu.js"></script>
